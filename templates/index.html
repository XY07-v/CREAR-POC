<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solicitud de Campo</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; max-width: 500px; }
        .form-group { margin-bottom: 15px; }
        label { font-weight: bold; display: block; margin-bottom: 5px; }
        input, select, button { width: 100%; padding: 10px; box-sizing: border-box; }
        button { background-color: #25D366; color: white; border: none; font-weight: bold; cursor: pointer; }
        button:disabled { background-color: #ccc; cursor: not-allowed; }
        #status { font-size: 0.9em; color: #555; margin-top: 5px; }
    </style>
</head>
<body>

    <h2>Formulario de Solicitud</h2>

    <form id="reporteForm">
        <div class="form-group">
            <label for="bmb">BMB:</label>
            <input type="text" id="bmb" required>
        </div>

        <div class="form-group">
            <label for="poc">Nombre del POC (según Base TA):</label>
            <input type="text" id="poc" required>
        </div>

        <div class="form-group">
            <label for="funcionario">Funcionario:</label>
            <input type="text" id="funcionario" required>
        </div>

        <div class="form-group">
            <label for="motivo">Motivo de la consulta:</label>
            <select id="motivo" required>
                <option value="">Seleccione...</option>
                <option value="Actualización">Actualización</option>
                <option value="Creación de POC">Creación de POC</option>
            </select>
        </div>

        <div class="form-group">
            <label for="placa">Foto de la Placa:</label>
            <input type="file" id="placa" accept="image/*" capture="environment" required>
        </div>

        <div class="form-group">
            <button type="button" onclick="obtenerUbicacion()">1. Capturar Ubicación</button>
            <div id="status">Ubicación no obtenida aún.</div>
        </div>

        <button type="submit" id="btnEnviar" disabled>2. Enviar por WhatsApp</button>
    </form>

    <script>
        let datosUbicacion = { lat: '', lon: '', departamento: '', ciudad: '' };

        function obtenerUbicacion() {
            const status = document.getElementById('status');
            if (!navigator.geolocation) {
                status.innerText = "La geolocalización no es soportada por su navegador.";
                return;
            }

            status.innerText = "Obteniendo ubicación...";

            navigator.geolocation.getCurrentPosition(
                async (position) => {
                    datosUbicacion.lat = position.coords.latitude;
                    datosUbicacion.lon = position.coords.longitude;

                    try {
                        const response = await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${datosUbicacion.lat}&lon=${datosUbicacion.lon}&format=json`);
                        const data = await response.json();
                        
                        datosUbicacion.ciudad = data.address.city || data.address.town || data.address.village || 'No detectada';
                        datosUbicacion.departamento = data.address.state || 'No detectado';

                        status.innerText = `Ubicación lista: ${datosUbicacion.ciudad}, ${datosUbicacion.departamento}`;
                        document.getElementById('btnEnviar').disabled = false;
                    } catch (error) {
                        status.innerText = `Coordenadas obtenidas (${datosUbicacion.lat}, ${datosUbicacion.lon})`;
                        document.getElementById('btnEnviar').disabled = false;
                    }
                },
                (error) => {
                    status.innerText = "Error al obtener ubicación. Asegúrese de otorgar permisos GPS.";
                }
            );
        }

        document.getElementById('reporteForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const btnEnviar = document.getElementById('btnEnviar');
            btnEnviar.innerText = "Procesando...";
            btnEnviar.disabled = true;

            const formData = new FormData();
            formData.append('bmb', document.getElementById('bmb').value);
            formData.append('poc', document.getElementById('poc').value);
            formData.append('funcionario', document.getElementById('funcionario').value);
            formData.append('motivo', document.getElementById('motivo').value);
            formData.append('placa', document.getElementById('placa').files[0]);
            formData.append('lat', datosUbicacion.lat);
            formData.append('lon', datosUbicacion.lon);
            formData.append('departamento', datosUbicacion.departamento);
            formData.append('ciudad', datosUbicacion.ciudad);

            try {
                const response = await fetch('/submit', {
                    method: 'POST',
                    body: formData
                });

                const result = await response.json();

                if (result.success) {
                    window.location.href = result.whatsapp_url;
                } else {
                    alert("Error al procesar el formulario: " + result.error);
                    btnEnviar.innerText = "2. Enviar por WhatsApp";
                    btnEnviar.disabled = false;
                }
            } catch (err) {
                alert("Error de conexión al enviar el formulario.");
                btnEnviar.innerText = "2. Enviar por WhatsApp";
                btnEnviar.disabled = false;
            }
        });
    </script>
</body>
</html>
