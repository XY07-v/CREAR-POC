<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solicitud de Campo</title>
    <!-- Fuentes e Iconos -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary-color: #075e54;
            --primary-light: #128c7e;
            --accent-color: #25d366;
            --bg-color: #f4f6f8;
            --card-bg: #ffffff;
            --text-main: #1f2937;
            --text-muted: #6b7280;
            --border-color: #e5e7eb;
            --radius: 12px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 480px;
            background: var(--card-bg);
            border-radius: var(--radius);
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.08), 0 8px 10px -6px rgba(0, 0, 0, 0.01);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, var(--primary-color), var(--primary-light));
            color: white;
            padding: 24px 20px;
            text-align: center;
        }

        .header h2 {
            font-size: 1.35rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .header p {
            font-size: 0.85rem;
            opacity: 0.9;
            margin-top: 5px;
        }

        form {
            padding: 24px 20px;
        }

        .form-group {
            margin-bottom: 18px;
        }

        label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 6px;
            color: var(--text-main);
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-wrapper i {
            position: absolute;
            left: 14px;
            color: var(--text-muted);
            font-size: 1rem;
        }

        input[type="text"], select {
            width: 100%;
            padding: 12px 14px 12px 42px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 0.95rem;
            background-color: #fafafa;
            transition: all 0.2s ease;
            color: var(--text-main);
        }

        select {
            appearance: none;
            cursor: pointer;
        }

        .select-wrapper::after {
            content: '\f107';
            font-family: 'Font Awesome 6 Free';
            font-weight: 900;
            position: absolute;
            right: 14px;
            color: var(--text-muted);
            pointer-events: none;
        }

        input:focus, select:focus {
            outline: none;
            border-color: var(--primary-light);
            background-color: #fff;
            box-shadow: 0 0 0 3px rgba(18, 140, 126, 0.15);
        }

        /* Estilo para la carga de archivos */
        .file-upload-label {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 14px;
            border: 2px dashed var(--border-color);
            border-radius: 8px;
            background-color: #fafafa;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 0.9rem;
            font-weight: 500;
            color: var(--text-muted);
        }

        .file-upload-label:hover {
            border-color: var(--primary-light);
            background-color: #f0fdf4;
            color: var(--primary-light);
        }

        input[type="file"] {
            display: none;
        }

        /* Botón de Ubicación */
        .btn-location {
            width: 100%;
            background-color: #e0f2fe;
            color: #0369a1;
            border: 1px solid #bae6fd;
            padding: 12px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-location:hover {
            background-color: #bae6fd;
        }

        .status-box {
            margin-top: 8px;
            font-size: 0.8rem;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .status-box.active {
            color: #15803d;
            font-weight: 500;
        }

        /* Botón de Enviar */
        .btn-submit {
            width: 100%;
            background-color: var(--accent-color);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 8px;
            font-weight: 700;
            font-size: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(37, 211, 102, 0.3);
            transition: all 0.2s ease;
            margin-top: 24px;
        }

        .btn-submit:hover {
            background-color: #22c55e;
            transform: translateY(-1px);
        }

        .btn-submit:disabled {
            background-color: #d1d5db;
            color: #9ca3af;
            box-shadow: none;
            cursor: not-allowed;
            transform: none;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h2><i class="fa-solid fa-clipboard-check"></i> Registro de Campo</h2>
            <p>Complete la información para generar la solicitud</p>
        </div>

        <form id="reporteForm">
            <div class="form-group">
                <label for="bmb">BMB</label>
                <div class="input-wrapper">
                    <i class="fa-solid fa-hashtag"></i>
                    <input type="text" id="bmb" placeholder="Ej: 12939" required>
                </div>
            </div>

            <div class="form-group">
                <label for="poc">Nombre del POC (según Base TA)</label>
                <div class="input-wrapper">
                    <i class="fa-solid fa-store"></i>
                    <input type="text" id="poc" placeholder="Ej: Tienda Juanita" required>
                </div>
            </div>

            <div class="form-group">
                <label for="funcionario">Funcionario</label>
                <div class="input-wrapper">
                    <i class="fa-solid fa-user-gear"></i>
                    <input type="text" id="funcionario" placeholder="Nombre completo" required>
                </div>
            </div>

            <div class="form-group">
                <label for="motivo">Motivo de la consulta</label>
                <div class="input-wrapper select-wrapper">
                    <i class="fa-solid fa-list-check"></i>
                    <select id="motivo" required>
                        <option value="">Seleccione motivo...</option>
                        <option value="Actualización">Actualización</option>
                        <option value="Creación de POC">Creación de POC</option>
                    </select>
                </div>
            </div>

            <div class="form-group">
                <label>Foto de la Placa</label>
                <label for="placa" class="file-upload-label" id="fileLabel">
                    <i class="fa-solid fa-camera"></i>
                    <span id="fileText">Tomar o adjuntar foto</span>
                </label>
                <input type="file" id="placa" accept="image/*" capture="environment" required onchange="actualizarNombreArchivo(this)">
            </div>

            <div class="form-group">
                <label>Ubicación GPS</label>
                <button type="button" class="btn-location" onclick="obtenerUbicacion()">
                    <i class="fa-solid fa-location-crosshairs"></i> Capturar Ubicación
                </button>
                <div id="status" class="status-box">
                    <i class="fa-solid fa-circle-info"></i> Ubicación no obtenida aún.
                </div>
            </div>

            <button type="submit" id="btnEnviar" class="btn-submit" disabled>
                <i class="fa-brands fa-whatsapp"></i> Compartir / Enviar por WhatsApp
            </button>
        </form>
    </div>

    <script>
        let datosUbicacion = { lat: '', lon: '', departamento: '', ciudad: '' };

        function actualizarNombreArchivo(input) {
            const fileLabel = document.getElementById('fileText');
            if (input.files && input.files[0]) {
                fileLabel.innerText = "Foto seleccionada: " + input.files[0].name;
            }
        }

        function obtenerUbicacion() {
            const status = document.getElementById('status');
            if (!navigator.geolocation) {
                status.innerHTML = `<i class="fa-solid fa-triangle-exclamation"></i> Geolocalización no soportada.`;
                return;
            }

            status.innerHTML = `<i class="fa-solid fa-spinner fa-spin"></i> Obteniendo coordenadas...`;

            navigator.geolocation.getCurrentPosition(
                async (position) => {
                    datosUbicacion.lat = position.coords.latitude;
                    datosUbicacion.lon = position.coords.longitude;

                    try {
                        const response = await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${datosUbicacion.lat}&lon=${datosUbicacion.lon}&format=json`);
                        const data = await response.json();
                        
                        datosUbicacion.ciudad = data.address.city || data.address.town || data.address.village || 'No detectada';
                        datosUbicacion.departamento = data.address.state || 'No detectado';

                        status.className = "status-box active";
                        status.innerHTML = `<i class="fa-solid fa-circle-check"></i> ${datosUbicacion.ciudad}, ${datosUbicacion.departamento}`;
                        document.getElementById('btnEnviar').disabled = false;
                    } catch (error) {
                        status.className = "status-box active";
                        status.innerHTML = `<i class="fa-solid fa-circle-check"></i> Coordenadas capturadas (${datosUbicacion.lat.toFixed(4)}, ${datosUbicacion.lon.toFixed(4)})`;
                        document.getElementById('btnEnviar').disabled = false;
                    }
                },
                (error) => {
                    status.innerHTML = `<i class="fa-solid fa-triangle-exclamation"></i> Active el GPS y otorgue permisos.`;
                }
            );
        }

        document.getElementById('reporteForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const btnEnviar = document.getElementById('btnEnviar');
            btnEnviar.innerHTML = `<i class="fa-solid fa-spinner fa-spin"></i> Procesando...`;
            btnEnviar.disabled = true;

            const formData = new FormData();
            formData.append('bmb', document.getElementById('bmb').value);
            formData.append('poc', document.getElementById('poc').value);
            formData.append('funcionario', document.getElementById('funcionario').value);
            formData.append('motivo', document.getElementById('motivo').value);
            formData.append('placa', document.getElementById('placa').files[0]);
            formData.append('lat', datosUbicacion.lat);
            formData.append('lon', datosUbicacion.lon);
            formData.append('departamento', datosUbicacion.departamento);
            formData.append('ciudad', datosUbicacion.ciudad);

            try {
                const response = await fetch('/submit', {
                    method: 'POST',
                    body: formData
                });

                const result = await response.json();

                if (result.success) {
                    // Usar Web Share API para permitir elegir Grupo o Chat Individual
                    if (navigator.share) {
                        try {
                            await navigator.share({
                                title: 'Solicitud de Campo',
                                text: result.texto_raw
                            });
                        } catch (shareError) {
                            // En caso de cancelar la ventana de compartir, redirigir por el enlace por defecto
                            console.log("Compartir cancelado o fallo, abriendo enlace directo.");
                            window.location.href = result.whatsapp_url;
                        }
                    } else {
                        // Respaldo para navegadores de escritorio sin menú de compartir
                        window.location.href = result.whatsapp_url;
                    }
                } else {
                    alert("Error al procesar: " + result.error);
                }
            } catch (err) {
                alert("Error de conexión al enviar el formulario.");
            } finally {
                btnEnviar.innerHTML = `<i class="fa-brands fa-whatsapp"></i> Compartir / Enviar por WhatsApp`;
                btnEnviar.disabled = false;
            }
        });
    </script>
</body>
</html>
