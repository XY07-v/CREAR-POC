<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reporte de Campo</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; max-width: 500px; }
        .form-group { margin-bottom: 15px; }
        label { font-weight: bold; display: block; margin-bottom: 5px; }
        input, select, button { width: 100%; padding: 10px; box-sizing: border-box; }
        button { background-color: #25D366; color: white; border: none; font-weight: bold; cursor: pointer; }
        #status { font-size: 0.9em; color: #555; margin-top: 5px; }
    </style>
</head>
<body>

    <h2>Formulario de Reporte</h2>

    <form id="reporteForm">
        <div class="form-group">
            <label for="bmb">BMB:</label>
            <input type="text" id="bmb" required>
        </div>

        <div class="form-group">
            <label for="poc">Nombre del POC (según Base TA):</label>
            <input type="text" id="poc" required>
        </div>

        <div class="form-group">
            <label for="funcionario">Funcionario:</label>
            <input type="text" id="funcionario" required>
        </div>

        <div class="form-group">
            <label for="motivo">Motivo de la consulta:</label>
            <select id="motivo" required>
                <option value="">Seleccione...</option>
                <option value="Inspección de rutina">Inspección de rutina</option>
                <option value="Mantenimiento">Mantenimiento</option>
                <option value="Verificación de datos">Verificación de datos</option>
                <option value="Otro">Otro</option>
            </select>
        </div>

        <div class="form-group">
            <label for="placa">Foto de la Placa:</label>
            <!-- Permite tomar foto directamente en dispositivos móviles -->
            <input type="file" id="placa" accept="image/*" capture="environment" required>
        </div>

        <div class="form-group">
            <button type="button" onclick="obtenerUbicacion()">1. Capturar Ubicación</button>
            <div id="status">Ubicación no obtenida aún.</div>
        </div>

        <button type="submit" id="btnEnviar" disabled>2. Enviar por WhatsApp</button>
    </form>

    <script>
        let datosUbicacion = {
            lat: '',
            lon: '',
            departamento: '',
            ciudad: ''
        };

        function obtenerUbicacion() {
            const status = document.getElementById('status');
            if (!navigator.geolocation) {
                status.innerText = "La geolocalización no es soportada por su navegador.";
                return;
            }

            status.innerText = "Solicitando permisos y obteniendo ubicación...";

            navigator.geolocation.getCurrentPosition(
                async (position) => {
                    datosUbicacion.lat = position.coords.latitude;
                    datosUbicacion.lon = position.coords.longitude;

                    // Geocodificación inversa usando OpenStreetMap (Nominatim API)
                    try {
                        const response = await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${datosUbicacion.lat}&lon=${datosUbicacion.lon}&format=json`);
                        const data = await response.json();
                        
                        datosUbicacion.ciudad = data.address.city || data.address.town || data.address.village || 'No detectada';
                        datosUbicacion.departamento = data.address.state || 'No detectado';

                        status.innerText = `Ubicación lista: ${datosUbicacion.ciudad}, ${datosUbicacion.departamento} (${datosUbicacion.lat}, ${datosUbicacion.lon})`;
                        document.getElementById('btnEnviar').disabled = false;
                    } catch (error) {
                        status.innerText = `Coordenadas obtenidas (${datosUbicacion.lat}, ${datosUbicacion.lon}), pero no se pudo obtener ciudad/departamento.`;
                        document.getElementById('btnEnviar').disabled = false;
                    }
                },
                (error) => {
                    status.innerText = "Error al obtener la ubicación: Permiso denegado o no disponible.";
                }
            );
        }

        document.getElementById('reporteForm').addEventListener('submit', function(e) {
            e.preventDefault();

            const bmb = document.getElementById('bmb').value;
            const poc = document.getElementById('poc').value;
            const funcionario = document.getElementById('funcionario').value;
            const motivo = document.getElementById('motivo').value;

            // Formatear el mensaje para WhatsApp
            const mensaje = `*NUEVO REPORTE DE CAMPO*%0A` +
                `*Funcionario:* ${funcionario}%0A` +
                `*BMB:* ${bmb}%0A` +
                `*POC (Base TA):* ${poc}%0A` +
                `*Motivo:* ${motivo}%0A` +
                `*Departamento:* ${datosUbicacion.departamento}%0A` +
                `*Ciudad:* ${datosUbicacion.ciudad}%0A` +
                `*Coordenadas:* ${datosUbicacion.lat}, ${datosUbicacion.lon}%0A` +
                `*Ubicación Maps:* https://maps.google.com/?q=${datosUbicacion.lat},${datosUbicacion.lon}`;

            const numeroTelefono = "573132691744"; // Código de país para Colombia (57) + número
            const urlWhatsApp = `https://wa.me/${numeroTelefono}?text=${mensaje}`;

            // Abrir WhatsApp con el mensaje prellenado
            window.open(urlWhatsApp, '_blank');
        });
    </script>
</body>
</html>
